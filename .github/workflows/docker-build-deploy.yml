name: CD - build and push Docker images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and push images to Azure Container Registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push auth-service image
        uses: docker/build-push-action@v6
        with:
          context: ./auth-service
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/expense-auth-service:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/expense-auth-service:latest

      - name: Build and push expense-service image
        uses: docker/build-push-action@v6
        with:
          context: ./expense-service
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/expense-expense-service:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/expense-expense-service:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/expense-web:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/expense-web:latest